<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHARITY: WATER GAME</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">

<div class="brand">
<img src="logo.png" class="logo">
<div>
<h1>CHARITY: WATER</h1>
<p>CLEANING OUR WAY FOR THE FUTURE</p>
</div>
</div>

<div class="stats">

<div class="box">
<div>LIVES</div>
<div id="livesDisplay"></div>
</div>

<div class="box">
<div>LEVEL</div>
<div id="levelDisplay">1</div>
</div>

<div class="box">
<div>SCORE</div>
<div id="scoreDisplay">0</div>
</div>

<div class="box">
<div>POLLUTION IN TANK</div>
<div id="dirtyTankDisplay">0 / 4</div>
</div>

</div>
</header>

<div class="instructions">
CLICK GREEN POLLUTED WATER DROPS BEFORE THEY ENTER THE RESERVOIR
</div>

<div id="gameArea">

<div id="messageBox">
Protect the reservoir and keep polluted water out.
</div>

<div class="buttons">
<button id="startBtn">START</button>
<button id="pauseBtn">PAUSE</button>
<button id="resetBtn">RESET</button>
</div>

<div class="pipe"></div>

<div class="sun"></div>

<div class="island">
<div class="tree"></div>
</div>

<div class="wave w1"></div>
<div class="wave w2"></div>
<div class="wave w3"></div>

<div id="dropsContainer"></div>

<div class="waterSystem">

<div class="drinkTank">
<div id="leftDrinkFill"></div>
<p>DRINKABLE WATER</p>
</div>

<div class="reservoirArea">

<div class="fillFrame">
<div id="reservoirFill"></div>
<div id="reservoirFillText">Reservoir Fill: 0 / 12</div>
</div>

<div id="reservoir">
RESERVOIR OF CLEAN WATER
</div>

</div>

<div class="drinkTank">
<div id="rightDrinkFill"></div>
<p>DRINKABLE WATER</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
