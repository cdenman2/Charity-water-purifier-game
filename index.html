<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHARITY WATER GAME</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game-shell">

<header class="top-bar">

<div class="brand-box">

<div class="brand-header">

<img
src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Charity_Water_logo.png"
class="charity-logo"
alt="Charity Water Logo"
>

<div class="brand-title">
CHARITY WATER
</div>

</div>

<div class="brand-subtitle">
CLEANING OUR WAY FOR THE FUTURE
</div>

</div>


<div class="hud">

<div class="hud-box lives-box">
<div class="hud-label">LIVES</div>
<div id="livesDisplay" class="glasses"></div>
</div>

<div class="hud-box level-box">
<div class="hud-label">LEVEL</div>
<div id="levelDisplay" class="hud-value">1</div>
</div>

<div class="hud-box score-box">
<div class="hud-label">SCORE</div>
<div id="scoreDisplay" class="hud-value">0</div>
</div>

<div class="hud-box danger-box">
<div class="hud-label">DIRTY IN TANK</div>
<div id="dirtyTankDisplay" class="hud-value">0 / 4</div>
</div>

</div>

</header>


<section class="instruction-panel">
CLICK GREEN POLLUTED WATER DROPS BEFORE THEY ENTER THE RESERVOIR
</section>


<main id="gameArea">


<div id="messageBox" class="message-box">
Protect the reservoir and keep polluted water out.
</div>


<div class="mobile-controls">

<button id="startBtn" class="control-btn start-btn">START</button>

<button id="pauseBtn" class="control-btn pause-btn">PAUSE</button>

<button id="resetBtn" class="control-btn reset-btn">RESET</button>

</div>


<div class="pipe-wrap">
<div class="pipe-top"></div>
<div class="pipe-mouth"></div>
</div>


<div class="background-scene">

<div class="sun"></div>

<div class="island">

<div class="palm-trunk"></div>

<div class="leaf leaf-1"></div>
<div class="leaf leaf-2"></div>
<div class="leaf leaf-3"></div>
<div class="leaf leaf-4"></div>

</div>


<div class="wave wave1"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>


<div class="dolphin dolphin1"></div>
<div class="dolphin dolphin2"></div>

</div>


<div id="dropsContainer"></div>


<div class="side-water left-water">
<div id="leftDrinkFill" class="side-water-fill"></div>
<div class="side-water-label">DRINKABLE WATER</div>
</div>

<div class="side-water right-water">
<div id="rightDrinkFill" class="side-water-fill"></div>
<div class="side-water-label">DRINKABLE WATER</div>
</div>


<div class="reservoir-fill-frame">

<div id="reservoirFill" class="reservoir-fill"></div>

<div id="reservoirFillText" class="reservoir-fill-text">
Reservoir Fill: 0 / 12
</div>

</div>


<div id="reservoir" class="reservoir">
RESERVOIR OF CLEAN WATER
</div>


</main>


<script src="script.js"></script>

</div>

</body>
</html>
