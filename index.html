<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHARITY: WATER GAME</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-bar">

<div class="brand-box">

<div class="brand-row">

<div class="logo-wrap">

<svg viewBox="0 0 140 140" class="logo-svg">
<rect x="22" y="28" width="62" height="78" rx="7" fill="#FFC907" stroke="#111" stroke-width="5"></rect>
<rect x="47" y="14" width="22" height="18" rx="3" fill="#FFC907" stroke="#111" stroke-width="5"></rect>
<line x1="36" y1="50" x2="70" y2="50" stroke="#111" stroke-width="6"/>
<line x1="36" y1="66" x2="70" y2="66" stroke="#111" stroke-width="6"/>
<line x1="36" y1="82" x2="62" y2="82" stroke="#111" stroke-width="6"/>
</svg>

</div>

<div>

<div class="brand-title">CHARITY: WATER</div>
<div class="brand-subtitle">CLEANING OUR WAY FOR THE FUTURE</div>

</div>

</div>

</div>

<div class="hud">

<div class="hud-box">
<div>LIVES</div>
<div id="livesDisplay"></div>
</div>

<div class="hud-box">
<div>LEVEL</div>
<div id="levelDisplay">1</div>
</div>

<div class="hud-box">
<div>SCORE</div>
<div id="scoreDisplay">0</div>
</div>

<div class="hud-box">
<div>POLLUTION IN TANK</div>
<div id="dirtyTankDisplay">0 / 4</div>
</div>

</div>

</header>

<div class="instruction-panel">
CLICK GREEN POLLUTED WATER DROPS BEFORE THEY ENTER THE RESERVOIR
</div>

<div id="gameArea">

<div class="sun"></div>

<div class="ocean"></div>

<div class="island"></div>

<!-- CLOWNFISH -->

<div class="clownfish fish1"></div>
<div class="clownfish fish2"></div>
<div class="clownfish fish3"></div>
<div class="clownfish fish4"></div>

<div class="pipe"></div>

<div id="dropsContainer"></div>

<div class="reservoir"></div>

<div id="confettiContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
